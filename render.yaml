services:
  - type: web
    name: cocktail-delivery
    runtime: python
    buildCommand: pip install -r requirements.txt && flask --app run:app db upgrade
    startCommand: gunicorn run:app
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: cocktail-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: FLASK_ENV
        value: production
      - key: MAIL_SERVER
        value: sandbox.smtp.mailtrap.io
      - key: MAIL_PORT
        value: 2525
      - key: MAIL_USERNAME
        sync: false   # set manually in Render dashboard — keep out of git
      - key: MAIL_PASSWORD
        sync: false   # set manually in Render dashboard — keep out of git

databases:
  - name: cocktail-db
    plan: free
